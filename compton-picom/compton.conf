#################################
#
# Backend
#
#################################

backend = "glx";

#################################
#
# GLX backend
#
#################################

# GLX backend: Copy unmodified regions from front buffer instead of redrawing them all.
glx-copy-from-front = false;

# OPTIMIZACIÓN: 'use-damage = true' reduce drásticamente el uso de CPU/GPU.
# Lo dejo en 'false' como pediste para evitar artefactos, pero tenlo en cuenta.
# use-damage = false;
use-damage = true;

#################################
#
# Shadows
#
#################################

shadow = true;
shadow-radius = 35;
shadow-offset-x = -35;
shadow-offset-y = -35;
shadow-opacity = 0.8;

shadow-exclude = [
	"_GTK_FRAME_EXTENTS@:c",
	"name = 'Notification'",
	"name = 'Plank'",
	"name = 'Docky'",
	"name = 'Kupfer'",
	"name = 'Pensela'",
	"name = 'Drawing Board'",
	"name = 'VirtualBox'",
	"name = 'VirtualBoxVM'",
	"name = 'Negatron v0.100.1' && argb",
	"name ?= 'xfwm4' && argb",
	"class_g = 'Conky'",
	"class_g = 'Kupfer'",
	"class_g = 'Synapse'",
	"class_g ?= 'Notify-osd'",
	"class_g ?= 'Cairo-dock'",
	"class_g = 'Cairo-clock'",
	"class_g ?= 'Xfce4-notifyd'",
	"class_g = 'Thunderbird' && argb",
	"name ?= 'Betterbird' && argb",
	"class_g = 'Telegram' && argb",
	"class_g ?= 'Thunderbird' && class_i = 'Popup' && argb",
	"class_g = 'firefox' && (window_type = 'utility' || window_type = 'popup_menu') && argb",
	"class_g = 'Firefox' && (window_type = 'utility' || window_type = 'popup_menu') && argb",
	"class_g = 'firefox-esr' && (window_type = 'utility' || window_type = 'popup_menu') && argb",
	"class_g = 'Firefox-esr' && (window_type = 'utility' || window_type = 'popup_menu') && argb",
	"class_g = 'Tor Browser' && (window_type = 'utility') && argb",
	"class_g = 'Navegador Tor' && (window_type = 'utility' || window_type = 'popup_menu') && argb",
	"class_g = 'Thunderbird' && (window_type = 'utility' || window_type = 'popup_menu') && argb",
	"class_g = 'betterbird' && (window_type = 'utility' || window_type = 'popup_menu') && argb",
	"class_g = 'Betterbird' && (window_type = 'utility' || window_type = 'popup_menu') && argb",
	"class_g = 'Mozilla Thunderbird' && (window_type = 'utility') && argb",
	"class_g ?= 'Xfce4-power-manager'",
  	"class_g ~= 'xdg-desktop-portal' && _NET_FRAME_EXTENTS@:c && window_type = 'dialog'",
  	"class_g ~= 'xdg-desktop-portal' && window_type = 'menu'",
   	"_NET_FRAME_EXTENTS@:c && WM_WINDOW_ROLE@:s = 'Popup'",
	"class_g ?= 'vokoscreen' && argb",
	"name = 'Área'",
	"name *= 'Cuenta regresiva'",
	"_NET_WM_WINDOW_TYPE:a *= '_KDE_NET_WM_WINDOW_TYPE_OVERRIDE'"
];

#################################
#
# Opacity
#
#################################

inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;

#################################
#
# Blur
#
#################################

blur-background = true;

# Método actual:
# blur-method = "kernel";
# "dual_kawase" es el método de desenfoque más optimizado y visualmente agradable hoy en día.


blur-method = "dual_kawase";

blur-kern = "9x9gaussian";

blur-background-exclude = [
    "class_g = 'Peek'",
	"class_g = 'Pensela'",
	"name = 'Drawing Board'",
    "window_type = 'dock'",
	"window_type = 'dropdown_menu'",
	"window_type = 'combo'",
	"window_type = 'popup_menu'",
	"window_type = 'utility'",
    "window_type = 'desktop'",
  	"class_g ~= 'xdg-desktop-portal' && _NET_FRAME_EXTENTS@:c && window_type = 'dialog'",
  	"class_g ~= 'xdg-desktop-portal' && window_type = 'menu'",
  	"_NET_FRAME_EXTENTS@:c && WM_WINDOW_ROLE@:s = 'Popup'",
	"_GTK_FRAME_EXTENTS@:c",
	"bounding_shaped && !rounded_corners",
	"_NET_WM_STATE@[*]:a *= '_NET_WM_STATE_HIDDEN'",
	"_NET_WM_STATE@[0]:a = '_NET_WM_STATE@_MAXIMIZED_VERT'",
	"_NET_WM_STATE@[0]:a = '_NET_WM_STATE@_MAXIMIZED_HORZ'"
];

opacity-exclude = [
    "name = 'Stratagus'"
];

#################################
#
# Fading
#
#################################

fading = false;
fade-in-step = 0.07;
fade-out-step = 0.07;
fade-exclude = [ ];

#################################
#
# OTHER CONFIG
#
#################################

log-level = "warn";
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;

corner-radius = 5;
rounded-corners-exclude =  [ "window_type = 'dock'", "window_type = 'desktop'" ];

# VSync activado para evitar tearing
vsync = true;

focus-exclude = [ "class_g = 'Cairo-clock'" ];

detect-transient = true;
detect-client-leader = true;
invert-color-include = [ ];

#################################
#
# Window type settings
#
#################################

# CORRECCIÓN: Se han añadido los puntos y coma (;) obligatorios
# al final de cada definición dentro del bloque.
wintypes:
{
	dock = { shadow = true; };
	dnd = { shadow = false; };
	popup_menu = { opacity = 1; };
	dropdown_menu = { opacity = 1; };
};

#################################
#
# ANIMATIONS
#
#################################
# OJO: Si recibes error de "unknown option 'animations'", es porque
# tu versión de picom no soporta animaciones. Si es así, comenta este bloque.

animations = true;

# Aumentamos la rigidez (Antes 120 -> Ahora 350). 
# Esto hace que la animación sea un "¡Zas!" rápido en lugar de un deslizamiento suave.
animation-stiffness = 350;

# Aumentamos ligeramente la amortiguación para que no "rebote" al final debido a la alta velocidad.
# (Antes 12 -> Ahora 25)
animation-dampening = 25;

# Reducimos el peso de la ventana. (Antes 0.5 -> Ahora 0.2).
# Ventanas más ligeras se mueven más rápido.
animation-window-mass = 0.2;

# El resto lo dejamos igual
animation-clamping = true;
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-exclude = [ ];
animation-unmap-exclude = [ ];
